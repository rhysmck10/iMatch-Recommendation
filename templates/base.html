<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>iMatch</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #6b7280;
  --border: #e5e7eb;
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --shadow: 0 4px 14px rgba(0,0,0,0.06);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 24px;
}

.topbar {
  background: white;
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.topbar-inner {
  max-width: 1100px;
  margin: auto;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand {
  font-weight: bold;
  font-size: 1.3rem;
  text-decoration: none;
  color: var(--primary);
}

.nav {
  display: flex;
  gap: 12px;
}

.nav a {
  text-decoration: none;
  font-weight: 600;
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
}

.nav a:hover {
  background: #eef2ff;
  color: var(--primary);
}

.page-header {
  margin-bottom: 20px;
}

.page-header h1 {
  margin: 0;
}

.page-header p {
  margin-top: 6px;
  color: var(--muted);
}

.flash {
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 16px;
  background: #fff7ed;
  border: 1px solid #fde68a;
}

.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.search-form {
  display: flex;
  gap: 8px;
}

input[type="text"],
input[type="password"],
select {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background: var(--primary);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  background: var(--primary-hover);
}

.button-secondary {
  background: #374151;
}

.button-secondary:hover {
  background: #1f2937;
}

/* MOVIE GRID */

.movie-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

/* MOVIE CARD */

.movie-row {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow);
}

.movie-title {
  font-weight: bold;
}

.movie-subtle {
  color: var(--muted);
  font-size: 0.9rem;
}

.rate-form {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}

/* RECOMMENDATIONS GRID */

.recommend-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
  gap: 18px;
}

.recommend-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.recommend-card img {
  width: 100%;
  height: 360px;
  object-fit: cover;
}

.recommend-body {
  padding: 14px;
}

.auth-card {
  max-width: 420px;
  margin: 40px auto;
  padding: 24px;
  background: white;
  border-radius: 10px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.auth-form {
  display: grid;
  gap: 12px;
}

.empty-state {
  padding: 20px;
  border: 1px dashed var(--border);
  border-radius: 10px;
  text-align: center;
  color: var(--muted);
}

/* MOBILE */

@media (max-width:700px){

.movie-list{
grid-template-columns:1fr;
}

.topbar-inner{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.controls{
flex-direction:column;
align-items:stretch;
}

.search-form{
width:100%;
}

}

</style>
</head>

<body>

<header class="topbar">
  <div class="topbar-inner">

    <a href="{{ url_for('index') }}" class="brand">iMatch</a>

    <nav class="nav">
      <a href="{{ url_for('index') }}">Rate Movies</a>
      <a href="{{ url_for('recommendations') }}">Recommendations</a>
      <a href="{{ url_for('liked_movies') }}">Liked Movies</a>
      <a href="{{ url_for('reset') }}">Reset</a>

      {% if session.get("user_id") %}
        <a href="{{ url_for('logout') }}">Logout</a>
      {% else %}
        <a href="{{ url_for('login') }}">Login</a>
        <a href="{{ url_for('register') }}">Register</a>
      {% endif %}
    </nav>

  </div>
</header>

<main class="container">

{% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for m in messages %}
      <div class="flash">{{ m }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}

</main>

</body>
</html>
